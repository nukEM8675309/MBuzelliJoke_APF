<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤡 April Fools - Chaos Overload 🤡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #00ff00;
            --neon-yellow: #ffff00;
            --neon-orange: #ff6600;
            --neon-red: #ff0000;
        }

        body {
            min-height: 100vh;
            background: #050505;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            perspective: 1500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ========== CHAOS OVERLOAD EFFECTS ========== */
        .chaos-overload {
            animation: overloadShake 0.3s infinite, invertColors 0.15s infinite;
        }

        .chaos-overload .lava-blob {
            animation: overloadBlob 0.2s infinite !important;
        }

        .chaos-overload .title {
            animation: overloadText 0.1s infinite !important;
        }

        @keyframes overloadShake {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, -5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(5px, 5px); }
        }

        @keyframes invertColors {
            0% { filter: invert(0) hue-rotate(0deg); }
            50% { filter: invert(1) hue-rotate(180deg); }
            100% { filter: invert(0) hue-rotate(0deg); }
        }

        @keyframes overloadBlob {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.5) translate(20px, -20px); }
            100% { transform: scale(1) translate(0, 0); }
        }

        @keyframes overloadText {
            0% { transform: scale(1) rotate(0deg); color: transparent; -webkit-text-stroke: 2px var(--neon-pink); }
            50% { transform: scale(1.1) rotate(2deg); color: var(--neon-yellow); -webkit-text-stroke: 2px var(--neon-red); }
            100% { transform: scale(1) rotate(0deg); color: transparent; -webkit-text-stroke: 2px var(--neon-pink); }
        }

        /* ========== LAVA LAMP BACKGROUND ========== */
        .lava-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a0a 100%);
            overflow: hidden;
        }

        .lava-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            transition: transform 0.3s ease-out;
            animation: blobPulse 4s ease-in-out infinite;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: var(--neon-pink);
            top: 20%;
            left: 20%;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: var(--neon-blue);
            top: 60%;
            left: 70%;
            animation-delay: -1s;
        }

        .blob-3 {
            width: 250px;
            height: 250px;
            background: var(--neon-orange);
            top: 40%;
            left: 50%;
            animation-delay: -2s;
        }

        .blob-4 {
            width: 350px;
            height: 350px;
            background: var(--neon-green);
            top: 80%;
            left: 30%;
            animation-delay: -3s;
        }

        @keyframes blobPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* ========== LIGHTNING FLASH ========== */
        .lightning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
        }

        .lightning-overlay.flash {
            animation: lightningFlash 0.3s ease-out;
        }

        @keyframes lightningFlash {
            0% { opacity: 0; }
            10% { opacity: 0.9; }
            20% { opacity: 0; }
            30% { opacity: 0.7; }
            40% { opacity: 0; }
            50% { opacity: 0.5; }
            100% { opacity: 0; }
        }

        .lightning-bolt {
            position: fixed;
            width: 10px;
            background: linear-gradient(180deg, #fff, var(--neon-blue), transparent);
            opacity: 0;
            pointer-events: none;
            z-index: 199;
            transform-origin: top center;
        }

        .lightning-bolt.strike {
            animation: lightningStrike 0.5s ease-out;
        }

        @keyframes lightningStrike {
            0% { opacity: 1; transform: scaleY(0) translateX(0); }
            20% { transform: scaleY(1) translateX(-10px); }
            40% { transform: scaleY(0.8) translateX(10px); }
            60% { transform: scaleY(1) translateX(-5px); }
            100% { opacity: 0; transform: scaleY(0) translateX(0); }
        }

        /* ========== TITLE TEXT ========== */
        .title {
            position: fixed;
            top: 5%;
            font-size: 5rem;
            color: transparent;
            -webkit-text-stroke: 2px white;
            text-transform: uppercase;
            z-index: 10;
            text-align: center;
            width: 100%;
            pointer-events: none;
            animation: titleGlow 2s ease-in-out infinite;
            text-shadow: 0 0 20px var(--neon-pink);
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 20px var(--neon-pink); }
            50% { text-shadow: 0 0 40px var(--neon-blue), 0 0 60px var(--neon-pink); }
        }

        /* ========== 3D CARD ========== */
        .scene {
            width: 400px;
            height: 500px;
            position: relative;
            z-index: 5;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
            overflow: hidden;
            background: #000;
        }

        .card-front {
            transform: rotateY(0deg);
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s;
        }

        .card:hover .card-front img {
            filter: brightness(1.3) contrast(1.2);
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-orange));
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .card-back img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transform: scaleX(-1);
            filter: hue-rotate(180deg) contrast(1.3);
        }

        .card-back h2 {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 3.5rem;
            text-shadow: 0 0 20px black, 0 0 40px var(--neon-yellow);
            animation: textShake 0.5s ease-in-out infinite;
        }

        @keyframes textShake {
            0%, 100% { transform: rotate(-3deg) scale(1); }
            50% { transform: rotate(3deg) scale(1.1); }
        }

        .card-back p {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 1.5rem;
            margin-top: 10px;
            text-shadow: 0 0 10px black;
        }

        /* ========== CURSOR ========== */
        .cursor {
            width: 30px;
            height: 30px;
            border: 3px solid var(--neon-green);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.2s;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 101;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px white;
        }

        .cursor.active {
            width: 50px;
            height: 50px;
            border-color: var(--neon-yellow);
            box-shadow: 0 0 30px var(--neon-yellow);
        }

        .cursor.overload {
            width: 80px;
            height: 80px;
            border-color: var(--neon-red);
            box-shadow: 0 0 50px var(--neon-red);
            animation: cursorSpin 0.5s linear infinite;
        }

        @keyframes cursorSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* ========== PARTICLES ========== */
        .particle {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            animation: particleFly 1s ease-out forwards;
        }

        @keyframes particleFly {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* ========== SPARK RINGS ========== */
        .spark-ring {
            position: fixed;
            border: 4px solid var(--neon-yellow);
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            animation: ringExpand 0.6s ease-out forwards;
            box-shadow: 0 0 20px var(--neon-yellow);
        }

        @keyframes ringExpand {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
                border-width: 6px;
            }
            100% {
                width: 400px;
                height: 400px;
                opacity: 0;
                border-width: 0px;
            }
        }

        /* ========== INSTRUCTION TEXT ========== */
        .instruction {
            position: fixed;
            bottom: 10%;
            color: white;
            font-size: 1.3rem;
            opacity: 0.8;
            pointer-events: none;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 10px var(--neon-blue);
            animation: instructionPulse 2s ease-in-out infinite;
        }

        @keyframes instructionPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ========== CHAOS METER ========== */
        .chaos-meter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: var(--neon-green);
            font-size: 1rem;
            z-index: 10;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .chaos-bar {
            width: 150px;
            height: 25px;
            border: 3px solid var(--neon-green);
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
            background: #000;
        }

        .chaos-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-yellow), var(--neon-pink), var(--neon-red));
            width: 0%;
            transition: width 0.2s ease;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .chaos-fill.overload {
            animation: overloadFill 0.2s infinite;
        }

        @keyframes overloadFill {
            0% { box-shadow: 0 0 20px var(--neon-red); }
            50% { box-shadow: 0 0 50px var(--neon-yellow); }
            100% { box-shadow: 0 0 20px var(--neon-red); }
        }

        .overload-warning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: var(--neon-red);
            text-shadow: 0 0 30px var(--neon-red);
            z-index: 300;
            pointer-events: none;
            opacity: 0;
            text-align: center;
        }

        .overload-warning.show {
            animation: warningFlash 0.5s ease-out;
        }

        @keyframes warningFlash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>

    <!-- Lava Lamp Background -->
    <div class="lava-container" id="lavaContainer">
        <div class="lava-blob blob-1" data-speed="0.5"></div>
        <div class="lava-blob blob-2" data-speed="0.7"></div>
        <div class="lava-blob blob-3" data-speed="0.3"></div>
        <div class="lava-blob blob-4" data-speed="0.6"></div>
    </div>

    <!-- Lightning Effects -->
    <div class="lightning-overlay" id="lightningOverlay"></div>

    <!-- Overload Warning -->
    <div class="overload-warning" id="overloadWarning">⚠️ CHAOS OVERLOAD ⚠️</div>

    <!-- Title -->
    <h1 class="title">April Fools</h1>

    <!-- Chaos Meter -->
    <div class="chaos-meter">
        CHAOS LEVEL
        <div class="chaos-bar">
            <div class="chaos-fill" id="chaosFill"></div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- 3D Card -->
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face card-front">
                <img src="mrbuzzeli.jpg" alt="Mr Buzzeli">
            </div>
            <div class="card-face card-back">
                <img src="mrbuzzeli.jpg" alt="Mr Buzzeli">
                <h2>🤡 GOTCHA! 🤡</h2>
                <p>April Fools!</p>
            </div>
        </div>
    </div>

    <p class="instruction">⚡ Move mouse for lava effect • Click image for LIGHTNING • Fill meter for OVERLOAD ⚡</p>

    <script>
        const card = document.getElementById('card');
        const cursor = document.getElementById('cursor');
        const cursorDot = document.getElementById('cursorDot');
        const lightningOverlay = document.getElementById('lightningOverlay');
        const lavaContainer = document.getElementById('lavaContainer');
        const lavaBlobs = document.querySelectorAll('.lava-blob');
        const chaosFill = document.getElementById('chaosFill');
        const overloadWarning = document.getElementById('overloadWarning');
        const scene = document.querySelector('.scene');

        // State
        let mouseX = 0;
        let mouseY = 0;
        let targetRotX = 0;
        let targetRotY = 0;
        let currentRotX = 0;
        let currentRotY = 0;
        let isFlipped = false;
        let chaosLevel = 0;
        let particleCount = 0;
        let isInOverload = false;
        const MAX_PARTICLES = 80;

        // Smooth Animation Loop
        function animate() {
            // Linear Interpolation for fluid movement
            currentRotX += (targetRotX - currentRotX) * 0.1;
            currentRotY += (targetRotY - currentRotY) * 0.1;

            const flipRotation = isFlipped ? 180 : 0;
            card.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY + flipRotation}deg)`;

            // Move lava blobs based on mouse
            lavaBlobs.forEach((blob, index) => {
                const speed = parseFloat(blob.dataset.speed);
                const xOffset = (mouseX * 100 * speed) + 'px';
                const yOffset = (mouseY * 100 * speed) + 'px';
                blob.style.transform = `translate(${xOffset}, ${yOffset}) scale(${1 + Math.sin(Date.now() / 1000 + index) * 0.2})`;
            });

            // Decay chaos level slowly (slower in overload)
            if (chaosLevel > 0 && !isInOverload) {
                chaosLevel -= 0.3;
                chaosFill.style.width = Math.max(0, chaosLevel) + '%';
            }

            requestAnimationFrame(animate);
        }

        animate();

        // Mouse Move
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            mouseX = (x - centerX) / centerX;
            mouseY = (y - centerY) / centerY;

            // Update cursor
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
            cursorDot.style.left = x + 'px';
            cursorDot.style.top = y + 'px';

            // Card rotation
            targetRotY = mouseX * 40;
            targetRotX = mouseY * -40;

            // Create particles sparingly
            if (Math.random() > 0.85 && particleCount < MAX_PARTICLES) {
                createParticle(x, y);
            }
        });

        // Click on Card
        scene.addEventListener('click', (e) => {
            isFlipped = !isFlipped;
            
            // Add chaos
            if (!isInOverload) {
                chaosLevel = Math.min(chaosLevel + 25, 100);
                chaosFill.style.width = chaosLevel + '%';
            }

            // Cursor feedback
            cursor.classList.add('active');
            setTimeout(() => cursor.classList.remove('active'), 200);

            // Lightning
            triggerLightning(e.clientX, e.clientY);

            // Explosion particles
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    createParticle(e.clientX, e.clientY);
                }, i * 30);
            }

            // Spark rings
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createSparkRing(e.clientX, e.clientY);
                }, i * 150);
            }

            // Check for overload
            if (chaosLevel >= 100 && !isInOverload) {
                triggerOverloadMode();
            }
        });

        // Trigger OVERLOAD MODE
        function triggerOverloadMode() {
            isInOverload = true;
            chaosFill.classList.add('overload');
            cursor.classList.add('overload');
            
            // Show warning
            overloadWarning.classList.add('show');
            setTimeout(() => overloadWarning.classList.remove('show'), 500);

            // RAPID LIGHTNING STORM
            let overloadCount = 0;
            const maxOverload = 30; // 30 lightning strikes
            
            const overloadInterval = setInterval(() => {
                triggerLightning();
                
                // Create extra particles
                createParticle(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
                
                overloadCount++;
                chaosLevel -= 3.3; // Drain chaos
                chaosFill.style.width = Math.max(0, chaosLevel) + '%';

                if (overloadCount >= maxOverload || chaosLevel <= 0) {
                    clearInterval(overloadInterval);
                    endOverloadMode();
                }
            }, 100);
        }

        // End Overload Mode
        function endOverloadMode() {
            isInOverload = false;
            chaosFill.classList.remove('overload');
            cursor.classList.remove('overload');
            chaosLevel = 0;
            chaosFill.style.width = '0%';
        }

        // Lightning Function
        function triggerLightning(x, y) {
            // Screen flash
            lightningOverlay.classList.add('flash');
            setTimeout(() => lightningOverlay.classList.remove('flash'), 300);

            // Create lightning bolt from top
            const bolt = document.createElement('div');
            bolt.classList.add('lightning-bolt');
            bolt.classList.add('strike');
            bolt.style.left = (Math.random() * window.innerWidth) + 'px';
            bolt.style.top = '0';
            bolt.style.height = (Math.random() * 300 + 200) + 'px';
            document.body.appendChild(bolt);

            setTimeout(() => bolt.remove(), 500);

            // Second bolt
            setTimeout(() => {
                const bolt2 = document.createElement('div');
                bolt2.classList.add('lightning-bolt');
                bolt2.classList.add('strike');
                bolt2.style.left = (Math.random() * window.innerWidth) + 'px';
                bolt2.style.top = '0';
                bolt2.style.height = (Math.random() * 300 + 200) + 'px';
                document.body.appendChild(bolt2);
                setTimeout(() => bolt2.remove(), 500);
            }, 100);
        }

        // Particle System
        function createParticle(x, y) {
            if (particleCount >= MAX_PARTICLES) return;

            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';

            const tx = (Math.random() - 0.5) * 300 + 'px';
            const ty = (Math.random() - 0.5) * 300 + 'px';
            particle.style.setProperty('--tx', tx);
            particle.style.setProperty('--ty', ty);

            const colors = [
                'var(--neon-pink)',
                'var(--neon-blue)',
                'var(--neon-green)',
                'var(--neon-yellow)',
                'var(--neon-orange)',
                'var(--neon-red)'
            ];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];

            document.body.appendChild(particle);
            particleCount++;

            setTimeout(() => {
                particle.remove();
                particleCount--;
            }, 1000);
        }

        // Spark Ring
        function createSparkRing(x, y) {
            const ring = document.createElement('div');
            ring.classList.add('spark-ring');
            ring.style.left = x + 'px';
            ring.style.top = y + 'px';
            ring.style.transform = 'translate(-50%, -50%)';
            document.body.appendChild(ring);

            setTimeout(() => ring.remove(), 600);
        }

        // Hover effects
        scene.addEventListener('mouseenter', () => {
            cursor.style.borderColor = 'var(--neon-pink)';
            cursor.style.boxShadow = '0 0 20px var(--neon-pink)';
        });

        scene.addEventListener('mouseleave', () => {
            cursor.style.borderColor = 'var(--neon-green)';
            cursor.style.boxShadow = '0 0 15px var(--neon-green)';
            targetRotX = 0;
            targetRotY = 0;
        });

        // Random ambient lightning at high chaos (but not in overload)
        setInterval(() => {
            if (chaosLevel > 50 && !isInOverload && Math.random() > 0.7) {
                triggerLightning();
            }
        }, 2000);
    </script>
</body>
</html>
