<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAOS MODE: April Fools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Hide default cursor for custom one */
        }

        body {
            min-height: 100vh;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            perspective: 1000px; /* Essential for 3D effects */
        }

        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
            mix-blend-mode: difference;
        }

        .cursor.active {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff00de;
        }

        /* Mouse Trail Particles */
        .trail {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 9998;
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            to {
                transform: scale(0);
                opacity: 0;
            }
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 10;
        }

        /* Crazy Text */
        .title {
            font-size: 6rem;
            color: transparent;
            -webkit-text-stroke: 2px rgba(255,255,255,0.8);
            position: relative;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-align: center;
            line-height: 1;
            pointer-events: none;
        }

        .title::before {
            content: 'APRIL FOOLS';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #fff;
            opacity: 0.5;
            filter: blur(10px);
            animation: textGlitch 0.2s infinite;
        }

        @keyframes textGlitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }

        /* The 3D Image Wrapper */
        .scene {
            width: 400px;
            height: 400px;
            perspective: 1000px;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Smooth follow */
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            animation: autoSpin 10s linear infinite;
        }

        .card:hover .card-inner {
            animation: crazySpin 2s linear infinite;
        }

        @keyframes autoSpin {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            100% { transform: rotateY(360deg) rotateX(360deg); }
        }

        @keyframes crazySpin {
            0% { transform: rotateY(0deg) rotateX(0deg) scale(1); }
            25% { transform: rotateY(180deg) rotateX(45deg) scale(1.2); }
            50% { transform: rotateY(360deg) rotateX(0deg) scale(1); }
            75% { transform: rotateY(540deg) rotateX(-45deg) scale(1.2); }
            100% { transform: rotateY(720deg) rotateX(0deg) scale(1); }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            border: 5px solid rgba(255,255,255,0.5);
            overflow: hidden;
        }

        .card-front {
            background: #000;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.2) saturate(1.5);
        }

        .card-back {
            background: linear-gradient(45deg, #ff00de, #00ffea);
            transform: rotateY(180deg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            font-weight: bold;
        }

        /* Background Grid */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 200vw;
            height: 200vh;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            z-index: 1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }

        /* Floating Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.6;
            z-index: 2;
            animation: floatOrb 10s ease-in-out infinite;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -50px); }
        }

        .subtitle {
            margin-top: 50px;
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 2px;
            animation: shakeText 0.5s infinite;
        }

        @keyframes shakeText {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            75% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }

    </style>
</head>
<body>

    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>

    <!-- Background Elements -->
    <div class="grid-bg"></div>
    <div class="orb" style="width: 300px; height: 300px; background: #ff00de; top: 10%; left: 20%;"></div>
    <div class="orb" style="width: 400px; height: 400px; background: #00ffea; bottom: 10%; right: 10%; animation-delay: -5s;"></div>

    <div class="container">
        <h1 class="title">APRIL<br>FOOLS</h1>

        <div class="scene">
            <div class="card" id="card">
                <div class="card-inner">
                    <div class="card-face card-front">
                        <!-- REPLACE WITH YOUR IMAGE -->
                        <img src="mrbuzzeli.jpg" alt="Mr Buzzeli">
                    </div>
                    <div class="card-face card-back">
                        GOTCHA!
                    </div>
                </div>
            </div>
        </div>

        <p class="subtitle">MOVE YOUR MOUSE TO CHAOS MODE 🌪️</p>
    </div>

    <script>
        const card = document.getElementById('card');
        const container = document.querySelector('.container');
        const cursor = document.getElementById('cursor');
        const scene = document.querySelector('.scene');

        // 1. Custom Cursor Logic
        document.addEventListener('mousemove', (e) => {
            // Move cursor dot
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            // Create Trail
            createTrail(e.clientX, e.clientY);

            // 3D Tilt Effect based on mouse position
            const xAxis = (window.innerWidth / 2 - e.pageX) / 20;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 20;
            
            // Apply rotation to the card wrapper
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // 2. Mouse Trail Function
        function createTrail(x, y) {
            const trail = document.createElement('div');
            trail.classList.add('trail');
            document.body.appendChild(trail);
            
            // Random color for trail
            const colors = ['#ff00de', '#00ffea', '#ffff00', '#ffffff'];
            trail.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            trail.style.left = x + 'px';
            trail.style.top = y + 'px';
            
            // Random size
            const size = Math.random() * 20 + 5;
            trail.style.width = size + 'px';
            trail.style.height = size + 'px';

            setTimeout(() => {
                trail.remove();
            }, 1000);
        }

        // 3. Click Interaction (Explosion)
        document.addEventListener('click', (e) => {
            cursor.classList.add('active');
            setTimeout(() => cursor.classList.remove('active'), 200);

            // Burst of trails
            for(let i=0; i<20; i++) {
                createTrail(e.clientX, e.clientY);
            }

            // Spin the image wildly on click
            card.style.transition = 'transform 0.5s';
            card.style.transform = `rotateY(${Math.random() * 360}deg) rotateX(${Math.random() * 360}deg) scale(1.5)`;
            
            setTimeout(() => {
                card.style.transition = 'transform 0.1s ease-out';
            }, 500);
        });

        // 4. Enter/Leave Animations
        container.addEventListener('mouseenter', () => {
            card.style.transition = 'none';
            // Reset animation to allow CSS hover effects to take over smoothly
        });

        container.addEventListener('mouseleave', () => {
            card.style.transition = 'transform 0.5s ease';
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // 5. Constant Confetti (Simplified for performance)
        setInterval(() => {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-10px';
            confetti.style.width = '10px';
            confetti.style.height = '10px';
            confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.zIndex = '5';
            confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
            document.body.appendChild(confetti);

            const fallSpeed = Math.random() * 2 + 1;
            const drift = Math.random() * 200 - 100;

            confetti.animate([
                { transform: `translateY(0) translateX(0) rotate(0deg)`, opacity: 1 },
                { transform: `translateY(100vh) translateX(${drift}px) rotate(720deg)`, opacity: 0 }
            ], {
                duration: fallSpeed * 1000,
                easing: 'linear'
            }).onfinish = () => confetti.remove();

        }, 50); // Create confetti every 50ms

    </script>
</body>
</html>
