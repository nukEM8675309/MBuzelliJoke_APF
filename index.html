<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid April Fools</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff0055;
            --bg: #050505;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom cursor only */
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px; /* Deep 3D space */
        }

        /* --- Fluid Background --- */
        .fluid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #000);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: floatBlob 20s infinite ease-in-out;
            border-radius: 50%;
        }

        .blob:nth-child(1) {
            top: 10%;
            left: 20%;
            width: 500px;
            height: 500px;
            background: var(--primary);
            animation-delay: 0s;
        }

        .blob:nth-child(2) {
            bottom: 20%;
            right: 10%;
            width: 600px;
            height: 600px;
            background: var(--secondary);
            animation-delay: -5s;
        }

        .blob:nth-child(3) {
            top: 40%;
            left: 60%;
            width: 300px;
            height: 300px;
            background: #7b2cbf;
            animation-delay: -10s;
        }

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 20px) scale(0.9); }
        }

        /* --- Custom Cursor --- */
        .cursor-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: difference;
        }

        .cursor-ring {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            transform: translate(-50%, -50%);
        }

        /* --- The 3D Card Container --- */
        .scene {
            width: 400px;
            height: 500px;
            perspective: 1500px;
            position: relative;
            z-index: 10;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* No transition here, we handle it in JS for fluidity */
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Hides the back when facing away */
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* FRONT SIDE (Your Image) */
        .card-front {
            background: #000;
            transform: rotateY(0deg);
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Advanced CSS Filter Animation */
            animation: imageGlitch 5s infinite linear;
        }

        @keyframes imageGlitch {
            0% { filter: hue-rotate(0deg) contrast(1); }
            50% { filter: hue-rotate(90deg) contrast(1.2); }
            100% { filter: hue-rotate(0deg) contrast(1); }
        }

        /* BACK SIDE (The Reveal) */
        .card-back {
            background: linear-gradient(135deg, #ff0055, #ff5e00);
            transform: rotateY(180deg);
            flex-direction: column;
            color: white;
            text-align: center;
        }

        .card-back h2 {
            font-size: 3rem;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: pulseText 1s infinite alternate;
        }

        .card-back p {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        @keyframes pulseText {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* --- Floating Particles --- */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
        }

        /* --- Text Overlay --- */
        .overlay-text {
            position: absolute;
            bottom: 50px;
            color: rgba(255,255,255,0.3);
            font-size: 1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            pointer-events: none;
            animation: fadeSlide 3s infinite ease-in-out;
        }

        @keyframes fadeSlide {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 0.8; transform: translateY(-10px); }
        }

        /* --- Glare Effect --- */
        .glare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 40%);
            pointer-events: none;
            z-index: 20;
            mix-blend-mode: overlay;
        }

    </style>
</head>
<body>

    <!-- Background Blobs -->
    <div class="fluid-bg">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <div class="scene">
        <div class="card" id="card">
            <div class="glare"></div>
            
            <!-- Front: Image -->
            <div class="card-face card-front">
                <img src="mrbuzzeli.jpg" alt="Mr Buzzeli">
            </div>
            
            <!-- Back: Message -->
            <div class="card-face card-back">
                <h2>Gotcha!</h2>
                <p>April Fools</p>
                <p style="font-size: 3rem;">🤡</p>
            </div>
        </div>
    </div>

    <div class="overlay-text">Move Mouse to Rotate • Click to Flip</div>

    <script>
        const card = document.getElementById('card');
        const scene = document.querySelector('.scene');
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorRing = document.querySelector('.cursor-ring');
        const glare = document.querySelector('.glare');

        // State for smooth animation (Linear Interpolation)
        let mouseX = 0;
        let mouseY = 0;
        let currentRotateX = 0;
        let currentRotateY = 0;
        let targetRotateX = 0;
        let targetRotateY = 0;
        let isFlipped = false;

        // Track Mouse Position
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Calculate center of screen
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // Normalize mouse position (-1 to 1)
            mouseX = (x - centerX) / centerX;
            mouseY = (y - centerY) / centerY;

            // Update Custom Cursor
            cursorDot.style.left = x + 'px';
            cursorDot.style.top = y + 'px';
            
            // Ring lags slightly behind dot for fluid feel
            cursorRing.animate({
                left: `${x}px`,
                top: `${y}px`
            }, { duration: 500, fill: "forwards" });

            // Create Particles on move
            if(Math.random() > 0.8) createParticle(x, y);
        });

        // Click to Flip 360 degrees
        document.addEventListener('click', () => {
            isFlipped = !isFlipped;
            // Add extra rotation to the target
            targetRotateY += 360; 
            createExplosion();
        });

        // Hover effects
        scene.addEventListener('mouseenter', () => {
            cursorRing.style.width = '80px';
            cursorRing.style.height = '80px';
            cursorRing.style.backgroundColor = 'rgba(255,255,255,0.1)';
        });

        scene.addEventListener('mouseleave', () => {
            cursorRing.style.width = '40px';
            cursorRing.style.height = '40px';
            cursorRing.style.backgroundColor = 'transparent';
            // Reset rotation slightly when leaving
            targetRotateX = 0;
            targetRotateY = isFlipped ? 360 : 0; 
        });

        // The Animation Loop (The Magic Fluidity)
        function animate() {
            // Calculate target rotation based on mouse position
            // We multiply by degrees to get the tilt amount
            targetRotateX = mouseY * -25; // Tilt up/down
            targetRotateY = mouseX * 25;  // Tilt left/right

            // If flipped, add 180deg to the Y rotation permanently
            const flipOffset = isFlipped ? 180 : 0;

            // LERP Formula: Current = Current + (Target - Current) * Speed
            // 0.1 is the speed. Lower = more fluid/slow, Higher = snappier
            currentRotateX += (targetRotateX - currentRotateX) * 0.1;
            currentRotateY += ((targetRotateY + flipOffset) - currentRotateY) * 0.1;

            // Apply transform
            card.style.transform = `rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg)`;

            // Move Glare effect opposite to mouse for realistic lighting
            glare.style.background = `linear-gradient(${125 + (mouseX * 20)}deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 40%)`;

            requestAnimationFrame(animate);
        }

        // Start the loop
        animate();

        // Particle System
        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            document.body.appendChild(particle);

            const size = Math.random() * 10 + 5;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            
            // Random color
            const colors = ['#00f2ff', '#ff0055', '#ffffff'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];

            // Animate particle
            const destinationX = (Math.random() - 0.5) * 200;
            const destinationY = (Math.random() - 0.5) * 200;
            const rotation = Math.random() * 520;
            const duration = Math.random() * 1000 + 500;

            particle.animate([
                { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                { transform: `translate(${destinationX}px, ${destinationY}px) rotate(${rotation}deg)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'cubic-bezier(0, .9, .57, 1)',
            }).onfinish = () => particle.remove();
        }

        function createExplosion() {
            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for(let i=0; i<30; i++) {
                setTimeout(() => createParticle(centerX, centerY), i * 20);
            }
        }

    </script>
</body>
</html>
