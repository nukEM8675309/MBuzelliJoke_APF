<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April Fools! 🎭</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #ffeaa7, #dfe6e9);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8),
                         0 0 40px rgba(255,255,255,0.6),
                         0 0 60px rgba(255,255,255,0.4);
            animation: titleFloat 3s ease-in-out infinite, 
                       titleGlow 2s ease-in-out infinite alternate;
            margin-bottom: 50px;
            text-align: center;
            letter-spacing: 5px;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-30px) rotate(2deg); }
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 0 20px rgba(255,255,255,0.8); }
            100% { text-shadow: 0 0 50px rgba(255,255,255,1), 0 0 100px rgba(255,255,255,0.8); }
        }

        .image-container {
            perspective: 1000px;
            margin: 30px;
        }

        .flip-image {
            width: 400px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            animation: flipRotate 4s ease-in-out infinite,
                       floatImage 3s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .flip-image:hover {
            animation: flipRotate 2s ease-in-out infinite,
                       floatImage 2s ease-in-out infinite;
        }

        @keyframes flipRotate {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            25% { transform: rotateY(180deg) rotateX(10deg); }
            50% { transform: rotateY(360deg) rotateX(0deg); }
            75% { transform: rotateY(540deg) rotateX(-10deg); }
            100% { transform: rotateY(720deg) rotateX(0deg); }
        }

        @keyframes floatImage {
            0%, 100% { transform: translateY(0) rotateY(0deg); }
            50% { transform: translateY(-20px) rotateY(180deg); }
        }

        .flip-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3),
                        0 0 40px rgba(255,255,255,0.5);
            position: absolute;
            backface-visibility: hidden;
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            background-color: #f00;
            animation: confettiFall linear infinite;
            top: -20px;
            z-index: 1;
            border-radius: 3px;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) translateX(100px);
                opacity: 0;
            }
        }

        .floating-shapes {
            position: fixed;
            border-radius: 50%;
            opacity: 0.3;
            animation: floatShape 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, 100px) rotate(90deg); }
            50% { transform: translate(0, 200px) rotate(180deg); }
            75% { transform: translate(-100px, 100px) rotate(270deg); }
        }

        .wave-text {
            animation: waveText 2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes waveText {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.2); }
        }

        .pulse-ring {
            position: absolute;
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: pulseRing 2s ease-out infinite;
            pointer-events: none;
        }

        @keyframes pulseRing {
            0% {
                width: 400px;
                height: 400px;
                opacity: 1;
            }
            100% {
                width: 600px;
                height: 600px;
                opacity: 0;
            }
        }

        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: sparkleAnim 1.5s ease-in-out infinite;
        }

        @keyframes sparkleAnim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .subtitle {
            font-size: 1.5rem;
            color: white;
            margin-top: 30px;
            animation: subtitleBounce 2s ease-in-out infinite;
            text-align: center;
        }

        @keyframes subtitleBounce {
            0%, 100% { transform: translateY(0); opacity: 1; }
            50% { transform: translateY(-10px); opacity: 0.8; }
        }

        .emoji-rain {
            position: fixed;
            font-size: 2rem;
            animation: emojiDrop 5s linear infinite;
            z-index: 5;
        }

        @keyframes emojiDrop {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Floating Background Shapes -->
    <div class="floating-shapes" style="width: 200px; height: 200px; background: rgba(255,255,255,0.2); top: 10%; left: 10%;"></div>
    <div class="floating-shapes" style="width: 150px; height: 150px; background: rgba(255,255,255,0.3); top: 60%; left: 80%; animation-delay: -5s;"></div>
    <div class="floating-shapes" style="width: 100px; height: 100px; background: rgba(255,255,255,0.25); top: 30%; left: 70%; animation-delay: -10s;"></div>

    <div class="container">
        <h1 class="title">
            <span class="wave-text">🎭</span>
            <span class="wave-text" style="animation-delay: 0.1s;">A</span>
            <span class="wave-text" style="animation-delay: 0.2s;">P</span>
            <span class="wave-text" style="animation-delay: 0.3s;">R</span>
            <span class="wave-text" style="animation-delay: 0.4s;">I</span>
            <span class="wave-text" style="animation-delay: 0.5s;">L</span>
            <span class="wave-text" style="animation-delay: 0.6s;"> </span>
            <span class="wave-text" style="animation-delay: 0.7s;">F</span>
            <span class="wave-text" style="animation-delay: 0.8s;">O</span>
            <span class="wave-text" style="animation-delay: 0.9s;">O</span>
            <span class="wave-text" style="animation-delay: 1.0s;">L</span>
            <span class="wave-text" style="animation-delay: 1.1s;">S</span>
            <span class="wave-text" style="animation-delay: 1.2s;">!</span>
            <span class="wave-text" style="animation-delay: 1.3s;">🎉</span>
        </h1>

        <div class="image-container">
            <div class="pulse-ring"></div>
            <div class="flip-image" id="flipImage">
                <img src="mrbuzzeli.jpg" alt="Mr Buzzeli" id="mainImage">
                <!-- Sparkles around image -->
                <div class="sparkle" style="top: -20px; left: 50%;"></div>
                <div class="sparkle" style="top: 50%; left: -20px; animation-delay: 0.3s;"></div>
                <div class="sparkle" style="top: 50%; right: -20px; animation-delay: 0.6s;"></div>
                <div class="sparkle" style="bottom: -20px; left: 50%; animation-delay: 0.9s;"></div>
            </div>
        </div>

        <p class="subtitle">🎪 Gotcha! You've been pranked! 🎪</p>
    </div>

    <script>
        // Create Confetti
        function createConfetti() {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#fd79a8', '#a29bfe'];
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(confetti);

            setTimeout(() => confetti.remove(), 5000);
        }

        // Create Emoji Rain
        function createEmojiRain() {
            const emojis = ['🎉', '🎊', '🎭', '😂', '🤡', '🎨', '✨', '🌟'];
            const emoji = document.createElement('div');
            emoji.className = 'emoji-rain';
            emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(emoji);

            setTimeout(() => emoji.remove(), 5000);
        }

        // Generate confetti continuously
        setInterval(createConfetti, 100);
        setInterval(createEmojiRain, 300);

        // Click interaction for extra fun
        document.getElementById('flipImage').addEventListener('click', function() {
            this.style.animation = 'none';
            this.offsetHeight; // Trigger reflow
            this.style.animation = 'flipRotate 1s ease-in-out 3, floatImage 1s ease-in-out infinite';
            
            // Burst of confetti on click
            for(let i = 0; i < 30; i++) {
                setTimeout(createConfetti, i * 50);
            }
        });

        // Add more sparkles on mouse move
        document.addEventListener('mousemove', function(e) {
            if(Math.random() > 0.9) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.position = 'fixed';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                sparkle.style.pointerEvents = 'none';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1500);
            }
        });

        // Initial burst
        for(let i = 0; i < 50; i++) {
            setTimeout(createConfetti, i * 100);
        }
    </script>
</body>
</html>
