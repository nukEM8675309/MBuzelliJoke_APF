<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April Fools - Optimized Chaos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-green: #00ff00;
        }

        body {
            min-height: 100vh;
            background: #050505;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            perspective: 1500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ========== OPTIMIZED BACKGROUND ========== */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #000);
            z-index: -2;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
            animation: orbFloat 10s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--neon-pink);
            top: 10%;
            left: 20%;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--neon-blue);
            bottom: 10%;
            right: 10%;
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        /* ========== TEXT ========== */
        .title {
            position: fixed;
            top: 5%;
            font-size: 5rem;
            color: transparent;
            -webkit-text-stroke: 2px white;
            text-transform: uppercase;
            z-index: 10;
            text-align: center;
            width: 100%;
            pointer-events: none;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 10px var(--neon-blue); }
            50% { text-shadow: 0 0 30px var(--neon-pink); }
        }

        /* ========== 3D CARD ========== */
        .scene {
            width: 400px;
            height: 500px;
            position: relative;
            z-index: 5;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* Transition handled in JS for smoothness */
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            overflow: hidden;
            background: #000;
        }

        .card-front {
            transform: rotateY(0deg);
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue));
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* REVERSED IMAGE ON BACK */
        .card-back img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            /* This flips the image horizontally */
            transform: scaleX(-1); 
            filter: hue-rotate(90deg);
        }

        .card-back h2 {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 3rem;
            text-shadow: 0 0 20px black;
            transform: rotate(-5deg);
        }

        /* ========== CURSOR ========== */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }

        .cursor-dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 101;
            transform: translate(-50%, -50%);
        }

        /* ========== PARTICLES (OPTIMIZED) ========== */
        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--neon-blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 4;
            animation: particleFade 1s forwards;
        }

        @keyframes particleFade {
            to {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }

        .instruction {
            position: fixed;
            bottom: 10%;
            color: white;
            font-size: 1.2rem;
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-gradient"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <!-- Text -->
    <h1 class="title">April Fools</h1>

    <!-- Cursor -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <!-- 3D Card -->
    <div class="scene">
        <div class="card" id="card">
            <div class="card-face card-front">
                <!-- MAKE SURE THIS IMAGE EXISTS -->
                <img src="mrbuzzeli.jpg" alt="Mr Buzzeli">
            </div>
            <div class="card-face card-back">
                <!-- Same image but reversed via CSS -->
                <img src="mrbuzzeli.jpg" alt="Mr Buzzeli">
                <h2>GOTCHA!</h2>
            </div>
        </div>
    </div>

    <p class="instruction">Move mouse to tilt • Click to flip</p>

    <script>
        const card = document.getElementById('card');
        const cursor = document.getElementById('cursor');
        const cursorDot = document.getElementById('cursorDot');
        const scene = document.querySelector('.scene');

        // Performance Optimization: Limit particles
        let particleCount = 0;
        const MAX_PARTICLES = 50;

        // Mouse State
        let mouseX = 0;
        let mouseY = 0;
        let targetRotX = 0;
        let targetRotY = 0;
        let currentRotX = 0;
        let currentRotY = 0;
        let isFlipped = false;

        // Smooth Animation Loop (RequestAnimationFrame)
        function animate() {
            // Linear Interpolation (Lerp) for smooth movement
            // 0.1 means it moves 10% of the way to the target each frame
            currentRotX += (targetRotX - currentRotX) * 0.1;
            currentRotY += (targetRotY - currentRotY) * 0.1;

            // Add flip rotation if active
            const flipRotation = isFlipped ? 180 : 0;

            // Apply transform
            card.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY + flipRotation}deg)`;

            requestAnimationFrame(animate);
        }

        // Start loop
        animate();

        // Mouse Move Event
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // Update Cursor
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
            cursorDot.style.left = x + 'px';
            cursorDot.style.top = y + 'px';

            // Calculate Rotation Targets
            // Divide by larger number to reduce tilt sensitivity
            targetRotY = (x - centerX) / 15; 
            targetRotX = (centerY - y) / 15;

            // Create particles sparingly (every 5th frame approx)
            if (Math.random() > 0.8) {
                createParticle(x, y);
            }
        });

        // Click Event
        document.addEventListener('click', (e) => {
            isFlipped = !isFlipped;
            
            // Cursor feedback
            cursor.style.width = '40px';
            cursor.style.height = '40px';
            setTimeout(() => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
            }, 200);

            // Burst of particles
            for(let i = 0; i < 10; i++) {
                createParticle(e.clientX, e.clientY);
            }
        });

        // Particle System (Optimized)
        function createParticle(x, y) {
            if (particleCount >= MAX_PARTICLES) return;

            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            
            // Random direction
            const tx = (Math.random() - 0.5) * 200 + 'px';
            const ty = (Math.random() - 0.5) * 200 + 'px';
            particle.style.setProperty('--x', tx);
            particle.style.setProperty('--y', ty);
            
            // Random color
            const colors = ['#ff00ff', '#00ffff', '#00ff00'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];

            document.body.appendChild(particle);
            particleCount++;

            // Cleanup after animation
            setTimeout(() => {
                particle.remove();
                particleCount--;
            }, 1000);
        }

        // Hover effects
        scene.addEventListener('mouseenter', () => {
            cursor.style.borderColor = '#ff00ff';
        });
        scene.addEventListener('mouseleave', () => {
            cursor.style.borderColor = '#00ff00';
            // Reset tilt slightly when leaving
            targetRotX = 0;
            targetRotY = 0;
        });

    </script>
</body>
</html>
